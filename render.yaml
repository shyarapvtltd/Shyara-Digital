# Production uses Render Static Site (Shyara-Digital) — see README for dashboard settings.
# Optional: backend Web Service when API is added (not required for the marketing site today).

services:
  - type: web
    name: shyara-digital-static
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
